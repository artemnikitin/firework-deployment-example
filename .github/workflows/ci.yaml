name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform:
    name: "Terraform: ${{ matrix.stack }}-${{ matrix.provider }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: control-plane
            provider: aws
            directory: terraform/control-plane/aws
          - stack: control-plane
            provider: gcp
            directory: terraform/control-plane/gcp
          - stack: data-plane
            provider: aws
            directory: terraform/data-plane/aws
          - stack: data-plane
            provider: gcp
            directory: terraform/data-plane/gcp
          - stack: dns-foundation
            provider: aws
            directory: terraform/dns-foundation
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
      - run: terraform fmt -check -recursive .
      - run: terraform init -backend=false
      - run: terraform validate
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: tflint

  packer:
    name: "Packer: ${{ matrix.provider }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: aws
            directory: packer/aws
            validate_args: ""
          - provider: gcp
            directory: packer/gcp
            validate_args: "-var=gcp_project=test-project"
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@main
        with:
          version: latest
      - run: packer fmt -check .
      - run: packer init .
      - run: packer validate ${{ matrix.validate_args }} .

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Packer scripts
        run: shellcheck packer/aws/*.sh packer/gcp/*.sh packer/scripts/*.sh
      - name: Startup templates
        run: shellcheck terraform/data-plane/aws/templates/user-data.sh.tpl terraform/data-plane/gcp/templates/startup-script.sh.tpl

  security-scan:
    name: "Trivy: ${{ matrix.stack }}-${{ matrix.provider }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: control-plane
            provider: aws
            directory: terraform/control-plane/aws
          - stack: control-plane
            provider: gcp
            directory: terraform/control-plane/gcp
          - stack: data-plane
            provider: aws
            directory: terraform/data-plane/aws
          - stack: data-plane
            provider: gcp
            directory: terraform/data-plane/gcp
          - stack: dns-foundation
            provider: aws
            directory: terraform/dns-foundation
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
      - run: trivy config --severity HIGH,CRITICAL --exit-code 1 --ignorefile "${{ matrix.directory }}/.trivyignore" "${{ matrix.directory }}/"

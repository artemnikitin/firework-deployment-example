name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform-data-plane:
    name: "Terraform: data-plane"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/data-plane
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform fmt
        run: terraform fmt -check -recursive .

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint init
        run: tflint --init

      - name: TFLint
        run: tflint

  terraform-control-plane:
    name: "Terraform: control-plane"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/control-plane
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform fmt
        run: terraform fmt -check -recursive .

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint init
        run: tflint --init

      - name: TFLint
        run: tflint

  packer-lint:
    name: Packer Lint & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packer
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Packer fmt
        run: packer fmt -check .

      - name: Packer init
        run: packer init .

      - name: Packer validate
        run: packer validate .

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck packer scripts
        run: shellcheck packer/scripts/*.sh

      - name: ShellCheck user-data template
        run: shellcheck terraform/data-plane/templates/user-data.sh.tpl

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: "Trivy: data-plane"
        run: trivy config --severity HIGH,CRITICAL --exit-code 1 --ignorefile terraform/data-plane/.trivyignore terraform/data-plane/

      - name: "Trivy: control-plane"
        run: trivy config --severity HIGH,CRITICAL --exit-code 1 --ignorefile terraform/control-plane/.trivyignore terraform/control-plane/
